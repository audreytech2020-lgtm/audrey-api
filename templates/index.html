<!DOCTYPE html>

<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Audrey Tech</title>

<style>
body {
    background: #080c14;
    color: white;
    font-family: Arial;
    margin: 0;
    text-align: center;
}

.hero {
    padding: 120px 20px;
}

.btn-primary {
    background: #00c8ff;
    color: black;
    padding: 15px 35px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    border: none;
}

.btn-primary:hover {
    background: #00aacc;
}
</style>

</head>

<body>

<div class="hero">
    <h1>🚀 AUDREY TECH</h1>
    <p>Technology that Shapes Tomorrow</p>

```
<br><br>

<button onclick="openApp()" class="btn-primary">
    Open Converter 🚀
</button>
```

</div>

<!-- POPUP -->

<div id="appModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
z-index:9999;
">

```
<div style="
position:relative;
width:90%;
height:90%;
margin:5% auto;
background:#0F1419;
border-radius:10px;
">

    <span onclick="closeApp()" style="
    position:absolute;
    top:10px;
    right:20px;
    font-size:30px;
    cursor:pointer;
    color:white;
    ">✖</span>

    <iframe src="https://audrey-api.onrender.com/app"
    style="width:100%; height:100%; border:none; border-radius:10px;">
    </iframe>

</div>
```

</div>

<script>
function openApp(){
    document.getElementById("appModal").style.display = "block";
}

function closeApp(){
    document.getElementById("appModal").style.display = "none";
}
</script>

</body>
</html>
